    <rect x="34" y="34" width="418" height="418" rx="18" fill="#F6F1E8"/>
    <path d="M34 112H452" stroke="#D6CBBE" stroke-width="2"/>
    <path d="M34 190H452" stroke="#D6CBBE" stroke-width="2"/>
    <path d="M34 268H452" stroke="#D6CBBE" stroke-width="2"/>
    <path d="M34 346H452" stroke="#D6CBBE" stroke-width="2"/>

    <g transform="translate(74 72) rotate(-5)" filter="url(#softShadow)">
      <rect width="150" height="132" rx="12" fill="#FFE66D"/>
      <path d="M24 38H124" stroke="#7B6422" stroke-width="7" stroke-linecap="round"/>
      <path d="M24 63H108" stroke="#7B6422" stroke-width="7" stroke-linecap="round"/>
      <path d="M24 88H86" stroke="#7B6422" stroke-width="7" stroke-linecap="round"/>
    </g>

    <g transform="translate(244 94) rotate(4)" filter="url(#softShadow)">
      <rect width="148" height="128" rx="12" fill="#FFB1A7"/>
      <rect x="24" y="28" width="100" height="56" rx="10" fill="#FFF8F4"/>
      <circle cx="53" cy="56" r="14" fill="#6CB6FF"/>
      <path d="M75 82L99 55L124 84H24L52 66L75 82Z" fill="#8BD67D"/>
    </g>

    <g transform="translate(104 254) rotate(3)" filter="url(#softShadow)">
