      <rect x="198" width="128" height="58" rx="12" fill="#FFFFFF" stroke="#D5DEE6" stroke-width="2"/>
      <text x="232" y="38" fill="#17212B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">React</text>
