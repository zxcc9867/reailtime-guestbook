<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Realtime Guestbook project thumbnail</title>
  <desc id="desc">A polished preview image for a realtime guestbook app with post-it notes, photo upload, drawing, and live comments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7D6"/>
      <stop offset="0.5" stop-color="#E9F7F1"/>
      <stop offset="1" stop-color="#F6E8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#253047" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#253047" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1110" cy="116" r="132" fill="#FFE08A" opacity="0.75"/>
  <circle cx="130" cy="540" r="160" fill="#BDEDE1" opacity="0.65"/>

  <g transform="translate(88 78)">
