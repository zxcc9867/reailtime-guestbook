      <rect width="132" height="112" rx="12" fill="#CDBBFF"/>
      <path d="M26 35H104" stroke="#4E3B83" stroke-width="7" stroke-linecap="round"/>
      <path d="M26 60H86" stroke="#4E3B83" stroke-width="7" stroke-linecap="round"/>
      <path d="M26 84H98" stroke="#4E3B83" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(634 112)">
    <text x="0" y="0" fill="#263238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="1.5">REALTIME GUESTBOOK</text>
    <text x="0" y="86" fill="#17212B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">Photo, Drawing,</text>
    <text x="0" y="168" fill="#17212B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">Live Wall</text>
    <rect x="4" y="206" width="476" height="5" rx="2.5" fill="#FF8B6A"/>
    <text x="0" y="270" fill="#40505F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">A Vite + React + Supabase app for event notes,</text>
    <text x="0" y="310" fill="#40505F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">canvas drawings, uploads, and realtime comments.</text>

